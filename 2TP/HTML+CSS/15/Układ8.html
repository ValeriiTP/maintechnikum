<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
        text-align: center;
        }
nav{
    display: flex;
    flex-direction:column;
    justify-content: flex-start;
    width: 40%;
}
#container{
    display: flex;
    height: 50vh;
   
}
main{
    display: flex;
    flex-direction:column;
    justify-content: flex-start;
     width: 60%;
}
footer,header{
height: 10vh;
background-color: #4dff97;
}
    
div, section{
    height: 20vh;
    background-color: #ff5050;
}
p{
    margin: 0;
}
    </style>
</head>
<body>
    <header>
<p>blok nagłówkowy</p>
    </header>
    <section id="container">
    <nav>
        <div><p>blok 1</p></div>
        <div><p>blok 2</p></div>
        <div><p>blok 3</p></div>
    </nav>
    <main>
     <section><p>sekcja 1</p></section>
     <section><p>sekcja 2</p></section>
     <section><p>sekcja 3</p></section>
    </main>
    </section>
    <footer>
        <p>blok stopki</p>
    </footer>
</body>
</html>
