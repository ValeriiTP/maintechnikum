<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        header, section, main, article, footer {
            padding: 10px;
        }
        header {
            background-color: lightblue;
        }
        section {
            background-color: lightgreen;
        }   
        main {
            background-color: lightyellow;
            display: flex;
            justify-content: center;
            height: 600px;
        }   
        #left, #right {
            background-color: lightgray;
           border: 1px solid red;
        }  
        #left{
            width: 50%;
            
        } 
        #right{
            width: 50%;
        }
        footer {
            background-color: lightcoral;
        }   

    </style>
</head>
<body>
    <header>   <p>blok nagłówkowy</p> </header>
    
    <main>
        <section id="left"><p>sekcja lewa</p></section>
        <section id="right"><p>sekcja prawa</p></section>
    </main>
    <footer><p>blok stopki</p></footer>
</body>
</html>
