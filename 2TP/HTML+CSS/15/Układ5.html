<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
*{
    margin: 0;
    text-align: center;
    justify-content: center;
}
#rightnav{
    display: flex;
    flex-direction: column;
    width: 65%;
    background-color: #ff067a;
}
main{
    display: flex;
    justify-content: center;
    height: 50vh;
    background-color: #5e1616;
}
#left{
    width: 30%;
}
header, footer{
height: 10vh;
background-color: #004883;
}
#obrazy{
    height: 8vh;
    background-color: #00a54a;
}
nav, #right{
    height: 25vh;

}
#right{
    background-color: #5ca8ff;
}
    </style>
</head>
<body>
    <header>
        <h1>blok nagłówkowy</h1>
    </header>
    <section id="obrazy">
        <p>blok sekcji obrazów</p>
    </section>
    <main>
        <section id="left">
            <p>blok sekcji lewej</p>
        </section>
        <section id="rightnav">
        <nav>
            <p>blok nawigacyjny</p>
        </nav>
        <section>
            <p>blok sekcji prawej</p>
        </section>
        </section>
    </main>
    <footer>
        <p>blok stopki</p>
    </footer>
</body>
</html>
