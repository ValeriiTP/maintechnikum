<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <form action="">
<input type="radio" id="krotkie" name="a">
<label for="krotkie">Krótkie</label>
<br>
<input type="radio" id="srednie" name="a">
<label for="srednie">Średnie</label>
<br>
<input type="radio" id="poldlugie" name="a">
<label for="poldlugie">Półdługie</label>
<br>
<input type="radio" id="dlugie" name="a">
<label for="dlugie">Długie</label>
<br>
<input type="button" value="Oblicz" onclick="oblicz()">
</form> 

<p id="wynik"></p>

<script>
    

    function oblicz(){
        let krotkie = document.getElementById("krotkie").checked;
    let srednie = document.getElementById("srednie").checked;
    let poldlugie = document.getElementById("poldlugie").checked;
    let dlugie = document.getElementById("dlugie").checked;

    let cena = 0;
        if(krotkie)    cena = 15;
        if(srednie)    cena = 20;
        if(poldlugie)    cena = 30;
        if(dlugie)    cena = 40;
        document.getElementById("wynik").innerHTML = "Cena: " + cena + " zł";
    }
</script>
</body>
</html>
